<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trudent Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <span class="eyebrow">Admin Access</span>
      <h1>Manage leads with confidence.</h1>
      <p class="admin-subtitle">Use the demo credentials to access the Trudent dashboard and track incoming website inquiries.</p>

      <form class="admin-form" id="loginForm">
        <div class="field">
          <label for="user">Username</label>
          <input id="user" name="user" placeholder="Enter admin username" required>
        </div>

        <div class="field">
          <label for="pass">Password</label>
          <input id="pass" name="pass" type="password" placeholder="Enter admin password" required>
        </div>

        <button class="btn btn-primary" type="submit">Login to Dashboard</button>
        <div class="form-note" id="loginStatus">Demo login: admin / admin123</div>
      </form>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
